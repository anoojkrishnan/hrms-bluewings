        - generic [ref=e219]:
          - heading "What is a disposable or temporary email address?" [level=2] [ref=e220]
          - paragraph [ref=e221]: The objective of disposable email address is to avoid giving out your personal email address in order to protect it, whether for reasons of confidentiality or to avoid receiving spam. Indeed, some websites can use your email address and some will even resell it. Your privacy on the internet is something to be taken seriously.
          - heading "There are several categories of disposable or temporary email solutions :" [level=3] [ref=e222]
          - list [ref=e223]:
            - listitem [ref=e224]: disposable email addresses that offer a temporary inbox for a limited time,
            - listitem [ref=e225]: disposable email addresses that automatically forward received messages to a personal email address,
            - listitem [ref=e226]: disposable email addresses that allow you to create or delete aliases (secondary email addresses).
          - paragraph [ref=e227]: YOPmail is in the first category but inboxes do not expire unlike most disposable email services.
          - heading "There are different ways to name disposable email address (DEA) services :" [level=3] [ref=e228]
          - paragraph [ref=e229]: Temporary email, throw-away address, Trash mail, One-time email, Anonymous email or Fake mail.
          - heading "Here are a few examples of the use of a disposable email address:" [level=3] [ref=e230]
          - list [ref=e231]:
            - listitem [ref=e232]: Registers on websites without disclosing my personal information.
            - listitem [ref=e233]: Do not share my email address so as not to receive spam.
            - listitem [ref=e234]: Give an email address to someone you don't trust.
            - listitem [ref=e235]: Subscribe to a newsletter.
            - listitem [ref=e236]: Write anonymous comments on blogs or forums.
            - listitem [ref=e237]: Register anonymously on a dating site.
            - listitem [ref=e238]: You are a developer, and you want to test your mail sending system.
            - listitem [ref=e239]: You need many email addresses quickly.
            - listitem [ref=e240]: ...
